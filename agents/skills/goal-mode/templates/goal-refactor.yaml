# 代码重构 Goal 模板

适用于模块级重构，要求可回归、不改变行为、无退化。

```yaml
title: "<模块名> 重构"
description: "重构 <模块>，提升可维护性/可测试性，保持已有行为不变"

inputs:
  repo_url: "<仓库 URL>"
  branch: "main"
  module_path: "<待重构模块的路径>"
  ref_docs:
    - "<已有测试文件路径>"
    - "<模块接口文档>"

constraints:
  - "已有 API 签名不可变（含同步/异步方法签名）"
  - "已有公共类/方法可见性不可降低"
  - "不可删除或重命名已有字段"
  - "不可引入新的外部依赖"
  - "已有行为不得改变（包括边界行为和错误处理）"
  - "覆盖率不得低于重构前"

success_criteria:
  - "所有已有单测通过（`npm test || mvn test || pytest ...`）"
  - "新增测试覆盖重构引入的新接口/新类"
  - "代码风格与项目现有风格一致"
  - "无新增 lint 告警（`npm run lint || gradle lint ...`）"
  - "重构前后 diff 只包含目标模块"

common_failure_modes:
  - "过度重构 — 重构范围超出目标模块，涉及不相关代码"
  - "误改行为 — 重构过程中改变了边界行为（null 处理、异常类型、性能特征）"
  - "忘记更新调用方 — 接口变化后未更新所有调用方"
  - "覆盖率下降 — 新增代码缺少测试覆盖"
  - "重构混入新功能 — 在重构中夹带新功能需求"

short_test: |
  # 回归测试
  npm test
  # 代码风格检查
  npm run lint

deliverables:
  - "PR：含重构范围说明、变更摘要、回归验证结果"
  - "覆盖率对比报告：重构前 vs 重构后"
```
