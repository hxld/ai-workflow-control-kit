# 测试修复 Goal 模板

适用于失败测试的修复，要求红转绿 + 回归护栏。

```yaml
title: "修复 <测试套件/模块> 失败测试"
description: "修复 <模块> 的失败测试，确保回归后通过，补充缺失的用例"

inputs:
  repo_url: "<仓库 URL>"
  branch: "<修复目标分支>"
  test_command: "npm test <模块路径> | mvn test -Dtest=... | pytest ..."
  failing_test_pattern: "<失败测试的名称或模式>"
  ci_log_url: "<CI 失败日志链接（可选）>"

constraints:
  - "不能跳过或注释掉失败的测试"
  - "不能降低已有测试的覆盖率"
  - "修复必须是真实的（不能 mock 掉问题）"
  - "修复后必须跑全量相关测试，不能只跑单用例"
  - "如果是基线问题（测试环境/数据/编译），与 # 环境异类分开分类"

success_criteria:
  - "指定测试套件全量通过（exit 0）"
  - "覆盖率不低于修复前"
  - "修复代码通过了 code review"
  - "修复方案在 CI 上验证通过（如适用）"

common_failure_modes:
  - "只修了现象没修根因 — 测试通过了但根本逻辑还有问题"
  - "测试数据依赖 — 修复依赖了特定的测试数据，换个环境就挂"
  - "修复范围过大 — 修改了无关模块，引入新问题"
  - "覆盖不完整 — 边界情况（null、空、超限、异常）未处理"
  - "性能退化 — 修复引入不必要的耗时操作或循环"
  - "忘记分类基线 Blockers — 编译/环境/运行环境问题不等于业务 RED"

short_test: |
  <test_command>

deliverables:
  - "PR：含问题根因分析、修复方案、验证结果"
  - "补充用例（如修复暴露了测试覆盖缺口）"
  - "如适用：corrections.log 条目（供反哺循环使用）"
```
